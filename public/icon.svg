<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Rounded Base Background -->
  <rect width="512" height="512" rx="128" fill="url(#grad)" />
  
  <!-- Stylized Elegant P/Gadget Logo Group -->
  <g transform="translate(136, 116)" filter="url(#glow)">
    <!-- Main Hexagon/Cube Outer frame -->
    <path d="M 120 0 L 240 70 L 240 210 L 120 280 L 0 210 L 0 70 Z" fill="none" stroke="#ffffff" stroke-width="24" stroke-linejoin="round" opacity="0.9" />
    
    <!-- Inner glowing Star / Sparkle element -->
    <path d="M 120 70 Q 120 140 190 140 Q 120 140 120 210 Q 120 140 50 140 Q 120 140 120 70 Z" fill="#ffffff" />
    
    <!-- Surrounding tech orbits -->
    <circle cx="120" cy="140" r="105" fill="none" stroke="#10b981" stroke-width="12" stroke-dasharray="20 15" opacity="0.8" />
  </g>
</svg>
